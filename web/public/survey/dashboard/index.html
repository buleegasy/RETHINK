<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>RE-THINK | 心理问卷数据大屏辅助面板</title>
  <!-- Google Fonts: Outfit & Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #09090b;
      --surface: rgba(255, 255, 255, 0.03);
      --surface-card: rgba(255, 255, 255, 0.02);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f4f4f5;
      --text-muted: #a1a1aa;
      --primary: #6366f1; /* Indigo */
      --accent-blue: #06b6d4; /* Cyan */
      --accent-emerald: #10b981; /* Emerald */
      --radius-lg: 24px;
      --radius-md: 16px;
      --font-display: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-sans: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      min-height: 100vh;
      position: relative;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* Ambient Glow Backgrounds */
    .glow-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 1;
      pointer-events: none;
    }

    .glow-circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(140px);
      opacity: 0.12;
      animation: pulsate 16s infinite alternate;
    }

    .glow-circle-1 {
      top: -10%;
      left: 10%;
      width: 600px;
      height: 600px;
      background: var(--primary);
    }

    .glow-circle-2 {
      bottom: 10%;
      right: 10%;
      width: 700px;
      height: 700px;
      background: var(--accent-blue);
    }

    @keyframes pulsate {
      0% { transform: scale(1) translate(0, 0); }
      100% { transform: scale(1.1) translate(50px, -30px); }
    }

    /* Layout Wrapper */
    .dashboard-wrapper {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1100px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    /* Header Panel */
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 24px;
    }

    .header-info h1 {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff, var(--text-muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-info p {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .actions-panel {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn {
      font-family: var(--font-display);
      padding: 10px 18px;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .btn-primary {
      background: var(--primary);
      border: none;
      color: #fff;
    }

    .btn-primary:hover {
      background: #4f46e5;
    }

    /* Loading Overlay */
    .loader-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: var(--radius-lg);
      transition: opacity 0.3s ease;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.05);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s infinite linear;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    /* Key Statistics Grid */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .stat-card {
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      backdrop-filter: blur(12px);
    }

    .stat-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-number {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, var(--text-muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Content Layout */
    .grid-2col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 860px) {
      .grid-2col {
        grid-template-columns: 1fr;
      }
    }

    /* Card Panels */
    .card-panel {
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: relative;
    }

    .card-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-title span.badge {
      background: var(--primary-glow);
      color: var(--primary);
      padding: 4px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
    }

    /* Leaderboard Styles */
    .leaderboard-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .leaderboard-item {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .emoji-rank {
      font-size: 13px;
      font-weight: bold;
      color: var(--text-muted);
      width: 20px;
      text-align: center;
    }

    .leaderboard-item:nth-child(1) .emoji-rank { color: #f59e0b; }
    .leaderboard-item:nth-child(2) .emoji-rank { color: #94a3b8; }
    .leaderboard-item:nth-child(3) .emoji-rank { color: #b45309; }

    .emoji-avatar {
      font-size: 32px;
      width: 44px;
      height: 44px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .emoji-stat-details {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .emoji-label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      font-weight: 500;
    }

    .emoji-name {
      color: var(--text);
    }

    .emoji-count {
      color: var(--text-muted);
    }

    /* Horizontal Progress Bars */
    .bar-track {
      height: 6px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary), var(--accent-blue));
      border-radius: 99px;
      transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* General distribution bars */
    .distribution-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .dist-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .dist-label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }

    .dist-label {
      color: var(--text-muted);
      font-weight: 500;
    }

    .dist-percent {
      color: var(--text);
      font-family: var(--font-display);
      font-weight: 600;
    }

    .dist-item .bar-fill {
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-emerald));
    }

    /* Custom Color Themes for items */
    .counseling-pain-panel .bar-fill {
      background: linear-gradient(90deg, #f43f5e, #fb7185); /* Reddish */
    }

    /* Onboarding Preference Styles */
    .pref-cards-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .pref-stat-card {
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      transition: all 0.2s ease;
    }

    .pref-stat-card:hover {
      background: rgba(255, 255, 255, 0.03);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .pref-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .pref-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .pref-desc {
      font-size: 12px;
      color: var(--text-muted);
    }

    .pref-num-block {
      text-align: right;
      flex-shrink: 0;
    }

    .pref-percentage {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      color: var(--accent-blue);
    }

    .pref-votes {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Feedbacks List (Full width) */
    .feedback-feed {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-height: 420px;
      overflow-y: auto;
      padding-right: 8px;
    }

    /* Custom Scrollbar */
    .feedback-feed::-webkit-scrollbar {
      width: 6px;
    }

    .feedback-feed::-webkit-scrollbar-track {
      background: transparent;
    }

    .feedback-feed::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 99px;
    }

    .feedback-feed::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .feedback-bubble {
      background: rgba(255, 255, 255, 0.015);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .feedback-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 12px;
    }

    .feedback-user {
      font-family: var(--font-display);
      color: var(--accent-blue);
      font-weight: 500;
    }

    .feedback-time {
      color: var(--text-muted);
    }

    .feedback-text {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
      word-break: break-all;
    }

    .no-data-hint {
      text-align: center;
      color: var(--text-muted);
      padding: 60px 0;
      font-size: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
  </style>
</head>
<body>

  <!-- Background Ambient Glow -->
  <div class="glow-container">
    <div class="glow-circle glow-circle-1"></div>
    <div class="glow-circle glow-circle-2"></div>
  </div>

  <div class="dashboard-wrapper">
    <!-- Header -->
    <header class="dashboard-header">
      <div class="header-info">
        <h1>RE-THINK 心理问卷数据大屏</h1>
        <p>收集高中生心理辅导痛点、首选场景及表情包交互倾向的开发决策辅助系统</p>
      </div>
      <div class="actions-panel">
        <button class="btn" id="refreshBtn">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 7.89M9 11l3-3 3 3m-3-3v12"/></svg>
          <span>手动刷新</span>
        </button>
        <a class="btn btn-primary" href="../survey/" target="_blank">
          <span>进入体验问卷</span>
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
        </a>
      </div>
    </header>

    <!-- Loading State -->
    <div class="card-panel" id="loadingPanel" style="min-height: 400px;">
      <div class="loader-overlay">
        <div class="spinner"></div>
      </div>
    </div>

    <!-- Empty State -->
    <div class="card-panel" id="emptyPanel" style="display: none; min-height: 300px;">
      <div class="no-data-hint">
        <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 13h6m-3-3v6m-9 1V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        <span>暂未收集到问卷反馈数据，快点击上方按钮参与测试吧！</span>
      </div>
    </div>

    <!-- Main Statistics Dashboard -->
    <div class="dashboard-content" id="dashboardContent" style="display: none; display: flex; flex-direction: column; gap: 32px;">
      
      <!-- Key Stats Grid -->
      <section class="stats-row">
        <div class="stat-card">
          <span class="stat-label">累计样本数</span>
          <span class="stat-number" id="statTotal">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">有效交互占比 (V2版)</span>
          <span class="stat-number" id="statV2Rate">0%</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">平均答题耗时</span>
          <span class="stat-number" id="statDuration">0s</span>
        </div>
      </section>

      <!-- Row 2: Emoji & Onboarding -->
      <div class="grid-2col">
        <!-- Emoji Leaderboard -->
        <section class="card-panel">
          <h2 class="card-title">
            <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            <span>情绪表情包得票排行榜</span>
            <span class="badge">限选3个</span>
          </h2>
          <div class="leaderboard-list" id="emojiLeaderboard">
            <!-- Dynamic insert -->
          </div>
        </section>

        <!-- Onboarding Preference -->
        <section class="card-panel">
          <h2 class="card-title">
            <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"/></svg>
            <span>首屏启动交互方案偏好</span>
          </h2>
          <div class="pref-cards-grid" id="onboardingPreferenceStats">
            <!-- Dynamic insert -->
          </div>
        </section>
      </div>

      <!-- Row 3: Scenarios & Pain Points -->
      <div class="grid-2col">
        <!-- Scenarios Dist -->
        <section class="card-panel">
          <h2 class="card-title">
            <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
            <span>AI 辅导高频心理求助场景分布</span>
          </h2>
          <div class="distribution-list" id="scenariosDistribution">
            <!-- Dynamic insert -->
          </div>
        </section>

        <!-- Pain Points Dist -->
        <section class="card-panel counseling-pain-panel">
          <h2 class="card-title">
            <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
            <span>AI 心理对话的“致命反感痛点”</span>
          </h2>
          <div class="distribution-list" id="painPointsDistribution">
            <!-- Dynamic insert -->
          </div>
        </section>
      </div>

      <!-- Feedbacks Panel -->
      <section class="card-panel">
        <h2 class="card-title">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/></svg>
          <span>中学生真实心声建议与吐槽 feed</span>
        </h2>
        <div class="feedback-feed" id="feedbackFeed">
          <!-- Dynamic insert -->
        </div>
      </section>

    </div>
  </div>

  <script>
    // Emojis mapping
    const EMOJI_MAP = {
      '🫠': '崩溃/融化',
      '💥': '爆炸/压力',
      '😭': '委屈/哭泣',
      '😑': '疲惫/无语',
      '🤡': '戏谑/自嘲',
      '🥺': '焦虑/求安慰',
      '🤢': '难受/恶心',
      '💤': '困倦/摆烂',
      '💀': '完蛋/骷髅',
      '🖕': '烦死/中指'
    };

    // Scenarios mapping
    const SCENARIO_MAP = {
      'midnight_emo': '凌晨 emo / 深夜焦虑失眠',
      'academic_crash': '考试砸了 / 沮丧委屈',
      'relationship_dispute': '人际争吵 / 憋闷不想跟熟人说',
      'social_fatigue': '社交焦虑疲惫 / 躲起来倾诉',
      'existential_void': '空虚无趣 / 树洞发呆',
      'highly_private': '敏感隐私 / 极度害怕学校家长知晓'
    };

    // Pain points mapping
    const PAIN_MAP = {
      'toxic_positivity': '空洞说教（一味劝“积极乐观”）',
      'clinical_survey': '医生式临床盘问 / 填一大堆量表',
      'no_memory': '“鱼的记忆” / 缺失上下文记忆',
      'stiff_template': '机械话套路回复 / 敷衍式交流',
      'privacy_paranoia': '隐私担忧 / 监控安全感缺乏'
    };

    // Onboarding preference mapping
    const PREF_MAP = {
      'emoji_selector': { name: '8-Emoji 全屏卡片选择', desc: '大图情绪点选，无打字开场压力' },
      'soft_chitchat': { name: '纯文字温和寒暄', desc: '软性问候引导“今天过得累吗？”' },
      'clinical_scale': { name: '临床心理评估引导', desc: '一上来直接做轻量画像选择题' }
    };

    // DOM selectors
    const loadingPanel = document.getElementById('loadingPanel');
    const emptyPanel = document.getElementById('emptyPanel');
    const dashboardContent = document.getElementById('dashboardContent');
    const refreshBtn = document.getElementById('refreshBtn');

    async function loadData() {
      // Show loading
      loadingPanel.style.display = 'block';
      emptyPanel.style.display = 'none';
      dashboardContent.style.display = 'none';

      const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
      const apiUrl = isLocalhost
        ? 'http://localhost:8787/api/survey/results'
        : 'https://re-think-agent-worker.buleegasy-6c8.workers.dev/api/survey/results';

      try {
        const response = await fetch(apiUrl);
        if (!response.ok) throw new Error('Failed to fetch data');
        const data = await response.json();
        
        if (!data || !data.results || data.results.length === 0) {
          loadingPanel.style.display = 'none';
          emptyPanel.style.display = 'block';
          return;
        }

        renderDashboard(data.results);
      } catch (err) {
        console.error('Error fetching dashboard data:', err);
        alert('无法拉取问卷数据，请检查服务状态。');
        loadingPanel.style.display = 'none';
        emptyPanel.style.display = 'block';
      }
    }

    function renderDashboard(results) {
      // 1. Basic Stats
      const total = results.length;
      document.getElementById('statTotal').textContent = total;

      // Filter V2 version records
      const v2Results = results.filter(row => row.data && row.data.surveyVersion === "2026.06.emoji_painpoint_v2");
      const v2Rate = Math.round((v2Results.length / total) * 100);
      document.getElementById('statV2Rate').textContent = v2Rate + '%';

      // Duration Calculator (Filter outliers > 600s or invalid)
      let totalDuration = 0;
      let validDurationCount = 0;
      results.forEach(row => {
        if (row.data && row.data.startedAt && row.data.completedAt) {
          const dur = (new Date(row.data.completedAt) - new Date(row.data.startedAt)) / 1000;
          if (dur > 2 && dur < 600) {
            totalDuration += dur;
            validDurationCount++;
          }
        }
      });
      const avgDuration = validDurationCount > 0 ? Math.round(totalDuration / validDurationCount) : 0;
      document.getElementById('statDuration').textContent = avgDuration + 's';

      // 2. Aggregate Emoji votes
      const emojiVotes = {};
      Object.keys(EMOJI_MAP).forEach(key => emojiVotes[key] = 0);
      
      results.forEach(row => {
        const emojis = row.data?.answers?.emojis || [];
        emojis.forEach(emo => {
          if (emojiVotes[emo] !== undefined) emojiVotes[emo]++;
        });
      });

      // Sort emojis
      const sortedEmojis = Object.entries(emojiVotes).map(([emoji, votes]) => ({
        emoji,
        votes,
        name: EMOJI_MAP[emoji],
        percent: total > 0 ? Math.round((votes / total) * 100) : 0
      })).sort((a, b) => b.votes - a.votes);

      // Render Emojis
      const emojiContainer = document.getElementById('emojiLeaderboard');
      emojiContainer.innerHTML = '';
      sortedEmojis.forEach((item, idx) => {
        const row = document.createElement('div');
        row.className = 'leaderboard-item';
        row.innerHTML = `
          <div class="emoji-rank">${idx + 1}</div>
          <div class="emoji-avatar"><span>${item.emoji}</span></div>
          <div class="emoji-stat-details">
            <div class="emoji-label-row">
              <span class="emoji-name">${item.name}</span>
              <span class="emoji-count">${item.votes} 票 (${item.percent}%)</span>
            </div>
            <div class="bar-track">
              <div class="bar-fill" style="width: ${item.percent}%"></div>
            </div>
          </div>
        `;
        emojiContainer.appendChild(row);
      });

      // 3. Aggregate Onboarding preference
      const onboardingVotes = { emoji_selector: 0, soft_chitchat: 0, clinical_scale: 0 };
      results.forEach(row => {
        const pref = row.data?.answers?.onboardingPreference;
        if (onboardingVotes[pref] !== undefined) onboardingVotes[pref]++;
      });

      const onboardingContainer = document.getElementById('onboardingPreferenceStats');
      onboardingContainer.innerHTML = '';
      Object.entries(onboardingVotes).forEach(([key, votes]) => {
        const info = PREF_MAP[key];
        const percent = total > 0 ? Math.round((votes / total) * 100) : 0;
        const card = document.createElement('div');
        card.className = 'pref-stat-card';
        card.innerHTML = `
          <div class="pref-info">
            <span class="pref-name">${info.name}</span>
            <span class="pref-desc">${info.desc}</span>
          </div>
          <div class="pref-num-block">
            <span class="pref-percentage">${percent}%</span>
            <div class="pref-votes">${votes} 票</div>
          </div>
        `;
        onboardingContainer.appendChild(card);
      });

      // 4. Aggregate Scenarios (多选题以参与总人数作为分母表示覆盖率)
      const scenarioVotes = {};
      Object.keys(SCENARIO_MAP).forEach(key => scenarioVotes[key] = 0);
      results.forEach(row => {
        const list = row.data?.answers?.scenarios || [];
        list.forEach(item => {
          if (scenarioVotes[item] !== undefined) scenarioVotes[item]++;
        });
      });

      const scenarioContainer = document.getElementById('scenariosDistribution');
      scenarioContainer.innerHTML = '';
      Object.entries(scenarioVotes).map(([key, votes]) => ({
        label: SCENARIO_MAP[key],
        percent: total > 0 ? Math.round((votes / total) * 100) : 0,
        votes
      })).sort((a,b) => b.votes - a.votes).forEach(item => {
        const row = document.createElement('div');
        row.className = 'dist-item';
        row.innerHTML = `
          <div class="dist-label-row">
            <span class="dist-label">${item.label}</span>
            <span class="dist-percent">${item.percent}% (${item.votes}票)</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" style="width: ${item.percent}%"></div>
          </div>
        `;
        scenarioContainer.appendChild(row);
      });

      // 5. Aggregate Pain Points
      const painVotes = {};
      Object.keys(PAIN_MAP).forEach(key => painVotes[key] = 0);
      results.forEach(row => {
        const list = row.data?.answers?.painPoints || [];
        list.forEach(item => {
          if (painVotes[item] !== undefined) painVotes[item]++;
        });
      });

      const painContainer = document.getElementById('painPointsDistribution');
      painContainer.innerHTML = '';
      Object.entries(painVotes).map(([key, votes]) => ({
        label: PAIN_MAP[key],
        percent: total > 0 ? Math.round((votes / total) * 100) : 0,
        votes
      })).sort((a,b) => b.votes - a.votes).forEach(item => {
        const row = document.createElement('div');
        row.className = 'dist-item';
        row.innerHTML = `
          <div class="dist-label-row">
            <span class="dist-label">${item.label}</span>
            <span class="dist-percent">${item.percent}% (${item.votes}票)</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" style="width: ${item.percent}%"></div>
          </div>
        `;
        painContainer.appendChild(row);
      });

      // 6. Suggestions Feed
      const feedbackContainer = document.getElementById('feedbackFeed');
      feedbackContainer.innerHTML = '';
      
      const validFeedbacks = results.filter(row => row.openFeedback && row.openFeedback.trim().length > 0);
      
      if (validFeedbacks.length === 0) {
        feedbackContainer.innerHTML = '<div class="no-data-hint" style="padding: 30px 0;"><span>暂无开放性心声反馈意见。</span></div>';
      } else {
        validFeedbacks.forEach(row => {
          const bubble = document.createElement('div');
          bubble.className = 'feedback-bubble';
          const timeStr = row.createdAt ? new Date(row.createdAt).toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' }) : '刚刚';
          bubble.innerHTML = `
            <div class="feedback-meta">
              <span class="feedback-user">#${row.id.substring(0,10)}...</span>
              <span class="feedback-time">${timeStr}</span>
            </div>
            <div class="feedback-text">${escapeHtml(row.openFeedback)}</div>
          `;
          feedbackContainer.appendChild(bubble);
        });
      }

      // Hide loading, show content
      loadingPanel.style.display = 'none';
      dashboardContent.style.display = 'flex';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Refresh Trigger
    refreshBtn.addEventListener('click', loadData);

    // Initial Load
    loadData();
  </script>
</body>
</html>
